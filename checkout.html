<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pacha Eats · Checkout</title><link rel="stylesheet" href="assets/css/styles.css"></head><body data-base=""><script src="assets/js/app.js"></script><script>mountLayout('')</script><main><section class="page-title"><div class="container"><h1>Checkout</h1><p>Flujo preparado para pagos en soles: Yape/Plin manual primero y luego Mercado Pago, Niubiz o EasyPay.</p></div></section><section class="section"><div class="container app-shell"><form id="orderForm" class="form-card"><h2>Datos de entrega</h2><div class="form-grid"><div class="field"><label>Nombre</label><input required placeholder="Nombre del cliente"></div><div class="field"><label>Celular</label><input required placeholder="WhatsApp"></div><div class="field" style="grid-column:1/-1"><label>Dirección</label><input required placeholder="Calle, referencia, distrito"></div><div class="field"><label>Método de pago</label><select><option>Efectivo</option><option>Yape / Plin</option><option>Mercado Pago - sandbox futuro</option><option>Niubiz - futuro</option><option>EasyPay - futuro</option></select></div><div class="field"><label>Tipo de comprobante</label><select><option>Boleta</option><option>Factura</option></select></div></div><div class="notice" style="margin:16px 0">Esta V1 no procesa pagos reales. Deja el contrato listo para conectar pasarela desde backend.</div><button class="btn btn-primary" type="submit">Crear pedido simulado</button><div id="checkoutResult" class="notice success hidden" style="margin-top:16px"></div></form><aside class="cart" id="checkoutCart"></aside></div></section></main><script src="assets/js/pages.js"></script><script>initCheckout()</script></body></html>
