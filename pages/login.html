<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Pacha Eats</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="header-container"></div>
    
    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Iniciar Sesión</h1>
                <p>Accede a tu cuenta de Pacha Eats</p>
            </div>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="loginEmail">Correo electrónico o teléfono</label>
                    <input type="text" id="loginEmail" required>
                </div>
                
                <div class="form-group">
                    <label for="loginPassword">Contraseña</label>
                    <div class="password-input">
                        <input type="password" id="loginPassword" required>
                        <button type="button" class="toggle-password" id="togglePassword">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                    <div class="form-options">
                        <div class="remember-me">
                            <input type="checkbox" id="remember">
                            <label for="remember">Recordarme</label>
                        </div>
                        <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
                    </div>
                </div>
                
                <button type="submit" class="btn-auth">Iniciar Sesión</button>
                
                <div class="divider">
                    <span>o continuar con</span>
                </div>
                
                <div class="social-auth">
                    <button type="button" class="social-btn google">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button type="button" class="social-btn facebook">
                        <i class="fab fa-facebook-f"></i> Facebook
                    </button>
                </div>
            </form>
            
            <div class="auth-footer">
                <p>¿No tienes una cuenta? <a href="register.html">Regístrate aquí</a></p>
                <p><a href="../index.html">← Volver al inicio</a></p>
            </div>
        </div>
        
        <!-- Modal de recuperación de contraseña -->
        <div id="passwordModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Recuperar Contraseña</h3>
                    <button class="close-modal">&times;</button>
                </div>
                <div class="modal-body">
                    <p>Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.</p>
                    <div class="form-group">
                        <input type="email" id="recoveryEmail" placeholder="tucorreo@ejemplo.com">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-secondary cancel-btn">Cancelar</button>
                    <button class="btn-primary send-btn">Enviar enlace</button>
                </div>
            </div>
        </div>
    </main>
    
    <div id="footer-container"></div>
    
    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Cargar header y footer
            fetch('../components/header.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('header-container').innerHTML = data;
                    // Actualizar enlace de usuario para que apunte a dashboard
                    const userLink = document.querySelector('.user-btn span');
                    if (userLink) {
                        userLink.textContent = 'Mi Cuenta';
                    }
                });
            
            fetch('../components/footer.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('footer-container').innerHTML = data;
                });
            
            // Toggle para mostrar/ocultar contraseña
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('loginPassword');
            
            if (togglePassword) {
                togglePassword.addEventListener('click', function() {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    this.innerHTML = type === 'password' ? '<i class="far fa-eye"></i>' : '<i class="far fa-eye-slash"></i>';
                });
            }
            
            // Validación del formulario
            const form = document.getElementById('loginForm');
            
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                
                // Validación básica
                if (!email || !password) {
                    alert('Por favor completa todos los campos');
                    return;
                }
                
                // Aquí iría la lógica de autenticación real
                console.log('Iniciando sesión con:', { email, password });
                
                // Simular autenticación exitosa
                showNotification('¡Inicio de sesión exitoso! Redirigiendo...', 'success');
                
                // Guardar estado de sesión (en una implementación real usarías tokens/cookies)
                localStorage.setItem('pachaEatsLoggedIn', 'true');
                localStorage.setItem('pachaEatsUser', email);
                
                // Redirigir al dashboard después de 1.5 segundos
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            });
            
            // Modal de recuperación de contraseña
            const forgotPassword = document.querySelector('.forgot-password');
            const passwordModal = document.getElementById('passwordModal');
            const closeModal = document.querySelector('.close-modal');
            const cancelBtn = document.querySelector('.cancel-btn');
            const sendBtn = document.querySelector('.send-btn');
            
            if (forgotPassword) {
                forgotPassword.addEventListener('click', function(e) {
                    e.preventDefault();
                    passwordModal.style.display = 'flex';
                });
            }
            
            // Cerrar modal
            function closePasswordModal() {
                passwordModal.style.display = 'none';
            }
            
            if (closeModal) closeModal.addEventListener('click', closePasswordModal);
            if (cancelBtn) cancelBtn.addEventListener('click', closePasswordModal);
            
            // Cerrar modal al hacer clic fuera
            window.addEventListener('click', function(e) {
                if (e.target === passwordModal) {
                    closePasswordModal();
                }
            });
            
            // Enviar enlace de recuperación
            if (sendBtn) {
                sendBtn.addEventListener('click', function() {
                    const email = document.getElementById('recoveryEmail').value;
                    
                    if (!email) {
                        alert('Por favor ingresa tu correo electrónico');
                        return;
                    }
                    
                    // Aquí iría la lógica para enviar el enlace de recuperación
                    showNotification(`Enlace de recuperación enviado a ${email}`, 'info');
                    closePasswordModal();
                    
                    // Limpiar campo
                    document.getElementById('recoveryEmail').value = '';
                });
            }
            
            // Función para mostrar notificaciones (si no está definida en main.js)
            function showNotification(message, type = 'success') {
                // Usar la función de main.js si existe, si no crear una básica
                if (typeof window.showNotification === 'function') {
                    window.showNotification(message, type);
                } else {
                    alert(message);
                }
            }
            
            // Estilos para el modal
            if (!document.querySelector('#modal-styles')) {
                const style = document.createElement('style');
                style.id = 'modal-styles';
                style.textContent = `
                    .modal {
                        display: none;
                        position: fixed;
                        top: 0;
                        left: 0;
                        width: 100%;
                        height: 100%;
                        background-color: rgba(0,0,0,0.5);
                        z-index: 10000;
                        align-items: center;
                        justify-content: center;
                    }
                    
                    .modal-content {
                        background-color: white;
                        border-radius: var(--radius-lg);
                        width: 90%;
                        max-width: 400px;
                        box-shadow: var(--shadow-lg);
                    }
                    
                    .modal-header {
                        display: flex;
                        justify-content: space-between;
                        align-items: center;
                        padding: 1.5rem;
                        border-bottom: 1px solid var(--gray-light);
                    }
                    
                    .modal-header h3 {
                        margin: 0;
                        color: var(--dark-color);
                    }
                    
                    .close-modal {
                        background: none;
                        border: none;
                        font-size: 1.5rem;
                        cursor: pointer;
                        color: var(--gray-medium);
                    }
                    
                    .modal-body {
                        padding: 1.5rem;
                    }
                    
                    .modal-footer {
                        padding: 1.5rem;
                        border-top: 1px solid var(--gray-light);
                        display: flex;
                        gap: 1rem;
                        justify-content: flex-end;
                    }
                    
                    .password-input {
                        position: relative;
                    }
                    
                    .toggle-password {
                        position: absolute;
                        right: 10px;
                        top: 50%;
                        transform: translateY(-50%);
                        background: none;
                        border: none;
                        color: var(--gray-medium);
                        cursor: pointer;
                    }
                    
                    .form-options {
                        display: flex;
                        justify-content: space-between;
                        align-items: center;
                        margin-top: 0.5rem;
                    }
                    
                    .remember-me {
                        display: flex;
                        align-items: center;
                        gap: 0.5rem;
                    }
                    
                    .forgot-password {
                        color: var(--primary-color);
                        font-size: 0.9rem;
                        text-decoration: none;
                    }
                    
                    .forgot-password:hover {
                        text-decoration: underline;
                    }
                    
                    .divider {
                        display: flex;
                        align-items: center;
                        margin: 1.5rem 0;
                        color: var(--gray-medium);
                    }
                    
                    .divider::before,
                    .divider::after {
                        content: "";
                        flex: 1;
                        border-bottom: 1px solid var(--gray-light);
                    }
                    
                    .divider span {
                        padding: 0 1rem;
                        font-size: 0.9rem;
                    }
                `;
                document.head.appendChild(style);
            }
        });
    </script>
</body>
</html>
